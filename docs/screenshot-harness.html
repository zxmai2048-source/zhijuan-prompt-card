<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zhijuan Prompt Card Panel Harness</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 78% 12%, rgba(130, 184, 155, 0.16), transparent 30%),
          linear-gradient(180deg, #111514, #07080c);
        color: #f7f3ee;
        font-family: Geist, "Plus Jakarta Sans", ui-sans-serif, system-ui, sans-serif;
      }

      .mock-page {
        width: min(820px, calc(100vw - 48px));
        padding: 48px 24px;
      }

      .mock-page h1 {
        margin: 0;
        font-size: 44px;
        letter-spacing: 0;
      }

      .mock-page p {
        width: 560px;
        max-width: 100%;
        color: #aeb4c2;
        line-height: 1.6;
      }

      .mock-image {
        width: 220px;
        height: 220px;
        margin-top: 26px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 24px;
        box-shadow: 0 24px 80px rgba(130, 184, 155, 0.18);
      }
    </style>
  </head>
  <body>
    <main class="mock-page">
      <h1>Reference Image Page</h1>
      <p>Harness page for rendering the injected floating panel during local visual verification.</p>
      <img class="mock-image" src="/public/icons/icon-128.png" alt="Zhijuan test image" />
    </main>

    <script>
      let listener;
      window.chrome = {
        runtime: {
          lastError: undefined,
          onMessage: { addListener(fn) { listener = fn; } },
          sendMessage(_message, callback) { callback && callback({ ok: true, data: {} }); }
        }
      };
    </script>
    <script src="../dist/content.js"></script>
    <script>
      const mode = new URLSearchParams(location.search).get('mode') || 'result';
      const sampleAnalysis = {
        zh: {
          prompt: '一张黑色磨砂玻璃 Chrome 插件界面，主体是紧凑的图片识别结果镜头：上方显示已选图片缩略图和质量评分，下方是清晰的提示词输出区，左侧有源、读、词、发流程轨。整体使用哑光石墨背景、细腻内边框折射和柔和湖绿色强调，布局克制、日常可用。',
          analysis: '画面依靠黑色磨砂玻璃、湖绿色状态和明确的源图/提示词分区建立高级工具感。'
        },
        en: {
          prompt: 'A premium black frosted-glass Chrome extension screenshot showing a compact image-to-prompt result lens, selected image preview, prompt output area, muted lake-green accent, inner refraction borders, copy actions, generator handoff buttons, crisp typography, subtle shadows, and a polished local-first creative tool atmosphere.',
          analysis: 'The image uses frosted glass, lake-green state feedback, and clear source/prompt separation to create a premium daily-use tool.'
        },
        zh_style_tags: ['黑色磨砂', '湖绿色强调', '结果镜头', '源图预览'],
        en_style_tags: ['black frosted glass', 'lake green accent', 'result lens', 'source preview'],
        json_prompt: {
          schema_version: 'reconstruction_v2',
          summary: 'Premium black frosted-glass Chrome extension result lens with source preview and copy-ready prompt output',
          generation_prompt:
            'A premium black frosted-glass Chrome extension screenshot showing a compact image-to-prompt result lens, selected image preview, prompt output area, muted lake-green accent, inner refraction borders, copy actions, generator handoff buttons, crisp typography, subtle shadows, and a polished local-first creative tool atmosphere.',
          generation_negative_prompt:
            'blurry text, cluttered layout, low contrast, harsh glow, broken UI, random icons, noisy background',
          spatial_dynamics:
            'Static floating extension panel; source preview sits above the prompt output; copy controls and generator handoff buttons stay inside one compact result lens.',
          subject: 'Compact image-to-prompt result lens interface',
          action_pose: 'Selected image preview and generated prompt displayed together',
          details_appearance: 'Black frosted glass, left flow rail, source thumbnail, prompt output, copy actions, generator buttons',
          environment_background: 'Matte graphite browser page and restrained software backdrop',
          lighting_atmosphere: 'Low-key soft lighting with muted lake-green edge refraction',
          composition_framing: 'Floating result lens, source strip above prompt output, compact readable hierarchy',
          style_camera: 'Premium SaaS tool screenshot with product photography polish',
          colors: ['matte charcoal', 'lake green', 'soft ivory'],
          materials: ['frosted glass', 'inner border', 'digital UI'],
          aspect_ratio: '4:5',
          quality_modifiers: ['premium UI', 'result lens', 'sharp text', 'soft shadow'],
          fidelity_priorities: ['copy-ready prompt priority 86 of 100 - keep the output area obvious', 'compact UI priority 74 of 100 - avoid adding extra result panels'],
          global_fingerprint: {
            style_index: 36,
            density: 'compact tool UI',
            spatial_flow: 'source preview above prompt output inside one result lens',
            optical_finish: ['crisp UI text', 'soft shadow'],
            render_finish: ['frosted glass interface', 'Chrome extension screenshot'],
            palette: ['#111817 matte charcoal - shell', '#7FAE91 lake green - accent', '#F4FFF8 soft ivory - text']
          },
          observation_units: [
            {
              id: 'result_lens',
              kind: 'layout_flow',
              priority: 86,
              prompt: 'keep a compact source preview and copy-ready prompt output inside the same black frosted-glass result lens',
              evidence: 'visible extension panel composition',
              location: 'center panel',
              must_preserve: ['source preview', 'prompt output', 'copy actions'],
              avoid_drift: ['extra result panels', 'marketing landing page layout']
            }
          ],
          text_elements: [],
          reconstruction_priorities: [
            {
              cue: 'copy-ready prompt output priority 86 of 100',
              priority: 86,
              tradeoff: 'tool usability outranks decorative chrome',
              compile_to_en_prompt: true,
              risk_if_missing: 'the output area becomes decorative and hard to copy'
            }
          ],
          likely_generation_intent: 'Show a refined local-first image prompt extension'
        },
        prompt_core:
          'Premium black frosted-glass result lens, selected image preview, prompt output, lake-green accent, local-first creative tool UI.',
        negative_prompt: 'blurry text, cluttered layout, low contrast, harsh glow, broken UI, random icons, noisy background'
      };

      function send(type, payload) {
        listener && listener({ type, payload }, {}, () => {});
      }
      window.__zpcHarnessSend = send;

      setTimeout(() => {
        if (mode === 'loading') {
          send('ANALYSIS_STARTED', {
            target: { kind: 'selection', title: 'Harness selection' },
            entry: { id: 'loading', createdAt: new Date().toISOString(), title: 'Running', favorite: false, status: 'running' }
          });
        } else {
          send('ANALYSIS_RESULT', {
            target: { kind: 'image', title: 'Harness image', srcUrl: '/public/icons/icon-128.png' },
            entry: {
              id: 'result',
              createdAt: new Date().toISOString(),
              title: 'Compact prompt analysis card interface',
              favorite: false,
              status: 'success',
              analysis: sampleAnalysis
            }
          });
        }
        if (mode === 'collapsed') {
          setTimeout(() => {
            const root = document.querySelector('#zhijuan-prompt-root')?.shadowRoot;
            const collapse = root?.querySelector('button[aria-label="折叠"], button[aria-label="Collapse"]');
            collapse && collapse.click();
          }, 180);
        }
      }, 120);
    </script>
  </body>
</html>
