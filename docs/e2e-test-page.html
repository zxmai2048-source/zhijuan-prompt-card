<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zhijuan E2E Test Image</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #08090d;
        color: #f8f3ed;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }

      main {
        display: grid;
        gap: 18px;
        justify-items: center;
      }

      img {
        width: 220px;
        height: 220px;
        image-rendering: auto;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 22px;
        box-shadow: 0 24px 80px rgba(255, 111, 18, 0.22);
      }

      h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <img id="e2e-image" src="/public/icons/icon-128.png" alt="Zhijuan prompt card icon" />
      <h1>Zhijuan Prompt Card E2E</h1>
    </main>
  </body>
</html>
